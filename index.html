<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코코아톡 목업 생성기</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', sans-serif; display: flex; height: 100vh; margin: 0; background-color: #f0f0f0; }
        
        /* 레이아웃 */
        .sidebar { width: 300px; background: white; border-right: 1px solid #ccc; display: flex; flex-direction: column; }
        .chat-container { flex: 1; display: flex; flex-direction: column; background-color: #b2c7d9; position: relative; }
        
        /* 헤더 */
        .header { background: #FEE500; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; border-bottom: 1px solid #e0c800; }
        
        /* 친구 목록 (사이드바) */
        .sidebar-header { padding: 15px; background: #eee; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .friend-list { flex: 1; overflow-y: auto; padding: 10px; }
        .friend-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; align-items: center; }
        .friend-controls button { font-size: 0.8em; padding: 2px 5px; cursor: pointer; }
        
        /* 채팅 영역 */
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* 말풍선 스타일 */
        .msg-wrapper { display: flex; flex-direction: column; max-width: 70%; position: relative; }
        .msg-wrapper.me { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.other { align-self: flex-start; align-items: flex-start; }
        
        .sender-name { font-size: 0.8em; margin-bottom: 4px; color: #333; }
        
        .bubble-container { display: flex; align-items: flex-end; gap: 5px; }
        .msg-wrapper.me .bubble-container { flex-direction: row-reverse; }
        
        .bubble { padding: 8px 12px; border-radius: 12px; font-size: 0.95em; word-break: break-all; }
        .me .bubble { background-color: #FEE500; border-top-right-radius: 2px; }
        .other .bubble { background-color: white; border-top-left-radius: 2px; }
        
        .time { font-size: 0.7em; color: #555; }
        
        /* 수정/삭제 버튼 (마우스 오버 시 표시) */
        .msg-controls { display: none; gap: 5px; margin-top: 5px; }
        .msg-wrapper:hover .msg-controls { display: flex; }
        .msg-controls button { font-size: 0.7em; cursor: pointer; border: 1px solid #ccc; background: white; border-radius: 3px; }
        
        /* 입력 폼 (하단) */
        .input-area { background: white; padding: 15px; border-top: 1px solid #ccc; display: flex; flex-direction: column; gap: 10px; }
        .control-panel { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .text-input-group { display: flex; gap: 10px; }
        input[type="text"], input[type="time"], select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        input[type="text"] { flex: 1; }
        button.send-btn { background: #FEE500; border: 1px solid #e0c800; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        /* 이모티콘 패널 */
        .emoji-panel { display: flex; gap: 5px; }
        .emoji-btn { cursor: pointer; background: none; border: 1px solid #ccc; border-radius: 4px; padding: 5px; font-size: 1.2em; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            친구 목록
            <button onclick="addFriend()">+ 추가</button>
        </div>
        <div class="friend-list" id="friendList">
            </div>
    </div>

    <div class="chat-container">
        <div class="header">코코아톡</div>
        
        <div class="chat-box" id="chatBox">
            </div>

        <div class="input-area">
            <div class="control-panel">
                <select id="senderSelect">
                    <option value="me">나 (Me)</option>
                    <option value="other">상대방 (Other)</option>
                </select>
                <input type="time" id="timeInput" value="10:00">
                <div class="emoji-panel">
                    <button class="emoji-btn" onclick="addEmoji('😀')">😀</button>
                    <button class="emoji-btn" onclick="addEmoji('😂')">😂</button>
                    <button class="emoji-btn" onclick="addEmoji('😍')">😍</button>
                    <button class="emoji-btn" onclick="addEmoji('👍')">👍</button>
                </div>
            </div>
            <div class="text-input-group">
                <input type="text" id="msgInput" placeholder="메시지를 입력하세요 (날짜/시간 조작 가능)" onkeypress="if(event.key === 'Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">전송</button>
            </div>
        </div>
    </div>

    <script>
        // 상태 관리
        let friends = ['홍길동', '김철수'];
        let messages = [
            { id: 1, sender: 'other', text: '안녕! 코코아톡 테스트 중이야.', time: '09:30', name: '홍길동' },
            { id: 2, sender: 'me', text: '오, 신기하네. 내가 쓴 글 시간도 조작돼?', time: '09:31', name: '' }
        ];

        // --- 친구 관리 기능 ---
        function renderFriends() {
            const list = document.getElementById('friendList');
            list.innerHTML = '';
            friends.forEach((friend, index) => {
                list.innerHTML += `
                    <div class="friend-item">
                        <span>${friend}</span>
                        <div class="friend-controls">
                            <button onclick="editFriend(${index})">수정</button>
                            <button onclick="deleteFriend(${index})">삭제</button>
                        </div>
                    </div>
                `;
            });
            updateSenderSelect();
        }

        function addFriend() {
            const name = prompt('추가할 친구 이름을 입력하세요:');
            if (name) { friends.push(name); renderFriends(); }
        }

        function editFriend(index) {
            const newName = prompt('수정할 이름을 입력하세요:', friends[index]);
            if (newName) { friends[index] = newName; renderFriends(); renderMessages(); }
        }

        function deleteFriend(index) {
            if (confirm('정말 삭제하시겠습니까?')) { friends.splice(index, 1); renderFriends(); }
        }

        function updateSenderSelect() {
            const select = document.getElementById('senderSelect');
            select.innerHTML = '<option value="me">나 (Me)</option>';
            friends.forEach(friend => {
                select.innerHTML += `<option value="${friend}">상대방: ${friend}</option>`;
            });
        }

        // --- 채팅 관리 기능 ---
        function renderMessages() {
            const box = document.getElementById('chatBox');
            box.innerHTML = '';
            messages.forEach(msg => {
                const isMe = msg.sender === 'me';
                const senderNameHTML = !isMe ? `<div class="sender-name">${msg.name}</div>` : '';
                
                box.innerHTML += `
                    <div class="msg-wrapper ${isMe ? 'me' : 'other'}">
                        ${senderNameHTML}
                        <div class="bubble-container">
                            <div class="bubble">${msg.text}</div>
                            <div class="time">${msg.time}</div>
                        </div>
                        <div class="msg-controls">
                            <button onclick="editMessage(${msg.id})">편집</button>
                            <button onclick="deleteMessage(${msg.id})">삭제</button>
                        </div>
                    </div>
                `;
            });
            box.scrollTop = box.scrollHeight; // 스크롤 맨 아래로
        }

        function sendMessage() {
            const input = document.getElementById('msgInput');
            const senderVal = document.getElementById('senderSelect').value;
            const timeVal = document.getElementById('timeInput').value;
            const text = input.value.trim();

            if (!text) return;

            const isMe = senderVal === 'me';
            messages.push({
                id: Date.now(),
                sender: isMe ? 'me' : 'other',
                text: text,
                time: timeVal || '00:00',
                name: isMe ? '' : senderVal
            });

            input.value = '';
            renderMessages();
        }

        function deleteMessage(id) {
            if (confirm('이 메시지를 삭제하시겠습니까?')) {
                messages = messages.filter(m => m.id !== id);
                renderMessages();
            }
        }

        function editMessage(id) {
            const msg = messages.find(m => m.id === id);
            if (!msg) return;

            const newText = prompt('메시지 내용을 수정하세요:', msg.text);
            if (newText === null) return;
            
            const newTime = prompt('시간을 조작하세요 (예: 14:30):', msg.time);
            if (newTime === null) return;

            msg.text = newText;
            msg.time = newTime;
            renderMessages();
        }

        function addEmoji(emoji) {
            const input = document.getElementById('msgInput');
            input.value += emoji;
            input.focus();
        }

        // 초기 렌더링
        renderFriends();
        renderMessages();
    </script>
</body>
</html>
