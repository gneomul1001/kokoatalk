<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코코아톡</title>
    <style>
        :root {
            --kakao-yellow: #FEE500;
            --kakao-bg: #BACEE0;
            --my-bubble: #FEE500;
            --other-bubble: #FFFFFF;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
        body { display: flex; height: 100vh; background-color: #f0f0f0; }

        /* 사이드바 관리자 패널 */
        #admin-panel { width: 350px; background: #fff; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        h3 { border-bottom: 2px solid var(--kakao-yellow); padding-bottom: 5px; margin-bottom: 10px; font-size: 16px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; color: #666; font-weight: bold; }
        input, select, button { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { background: #4a4a4a; color: #fff; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background: #333; }
        .btn-yellow { background: var(--kakao-yellow); color: #000; }
        .btn-yellow:hover { background: #e6ce00; }
        
        /* 목록 스타일 */
        .list-container { max-height: 150px; overflow-y: auto; border: 1px solid #eee; padding: 5px; border-radius: 4px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 5px; font-size: 13px; border-bottom: 1px solid #f9f9f9; }
        .item-row button { padding: 2px 6px; font-size: 11px; background: #ff4d4d; }

        /* 카카오톡 채팅창 영역 */
        #chat-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; background: #e2e2e2; }
        #phone-container { width: 380px; height: 680px; background: var(--kakao-bg); display: flex; flex-direction: column; box-shadow: 0 4px 20px rgba(0,0,0,0.2); border-radius: 10px; overflow: hidden; position: relative; }
        
        /* 채팅방 헤더 */
        #chat-header { background: rgba(0, 0, 0, 0.08); padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.05); }
        #room-title { font-weight: bold; font-size: 16px; color: #191919; }
        #user-count { font-size: 12px; color: #707070; margin-left: 5px; }

        /* 채팅 내용 영역 */
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* 말풍선 공통 스타일 */
        .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; position: relative; }
        .msg-wrapper.other { align-self: flex-start; }
        .msg-wrapper.me { align-self: flex-end; align-items: flex-end; }
        
        .sender-name { font-size: 12px; color: #4e4e4e; margin-bottom: 3px; display: flex; align-items: center; gap: 4px;}
        .sender-tag { background: #e6ce00; font-size: 9px; padding: 1px 3px; border-radius: 3px; color: #fff; font-weight: bold;}
        
        .bubble-area { display: flex; align-items: flex-end; gap: 5px; }
        .me .bubble-area { flex-direction: row-reverse; }

        .bubble { padding: 8px 12px; border-radius: 5px; font-size: 14px; word-break: break-all; box-shadow: 0 1px 2px rgba(0,0,0,0.1); cursor: pointer; position: relative; }
        .other .bubble { background: var(--other-bubble); color: #000; border-top-left-radius: 0; }
        .me .bubble { background: var(--my-bubble); color: #000; border-top-right-radius: 0; }
        
        .msg-time { font-size: 10px; color: #707070; white-space: nowrap; }

        /* 말풍선 호버 시 수정/삭제 메뉴 */
        .bubble-menu { display: none; position: absolute; top: -30px; background: #333; color: #fff; font-size: 11px; border-radius: 4px; padding: 3px 5px; gap: 5px; z-index: 10; }
        .bubble:hover .bubble-menu { display: flex; }
        .bubble-menu span { cursor: pointer; padding: 0 3px; }
        .bubble-menu span:hover { color: var(--kakao-yellow); }

        /* 하단 입력창 (실제 작동X, 데코용) */
        #chat-input-area { background: #fff; padding: 10px; display: flex; gap: 10px; align-items: center; }
        #chat-input-area input { flex: 1; border: none; background: #f5f5f5; border-radius: 15px; padding: 8px 15px; outline: none; }
        #send-btn-dummy { background: var(--kakao-yellow); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #000; font-weight: bold; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <div>
            <h3>1. 오픈채팅방 설정</h3>
            <div class="form-group">
                <label>채팅방 이름</label>
                <input type="text" id="input-room-name" value="코딩 공부하는 오픈채팅방" oninput="updateRoomName()">
            </div>
        </div>

        <div>
            <h3>2. 친구(참여자) 추가</h3>
            <div class="form-group" style="flex-direction: row; gap: 5px;">
                <input type="text" id="input-friend-name" placeholder="친구 이름 입력" style="flex: 1;">
                <button onclick="addFriend()" class="btn-yellow">추가</button>
            </div>
            <label style="margin-top: 5px; display:block;">현재 참여자 목록</label>
            <div id="friend-list" class="list-container"></div>
        </div>

        <div>
            <h3>3. 대화 추가하기</h3>
            <div class="form-group">
                <label>보내는 사람</label>
                <select id="select-sender">
                    <option value="me">나 (본인)</option>
                </select>
            </div>
            <div class="form-group" style="margin-top: 8px;">
                <label>메시지 내용</label>
                <input type="text" id="input-msg-content" placeholder="메시지를 입력하세요" onkeypress="if(event.key==='Enter') textSend()">
            </div>
            <button onclick="textSend()" class="btn-yellow" style="margin-top: 8px; width: 100%;">메시지 전송 (시뮬레이트)</button>
        </div>
        
        <div style="font-size: 11px; color: #888; text-align: center; margin-top: auto;">
            💡 Tip: 채팅창 안의 말풍선에 마우스를 올리면<br><strong>수정 및 삭제</strong>를 할 수 있습니다!
        </div>
    </div>

    <div id="chat-wrapper">
        <div id="phone-container">
            <div id="chat-header">
                <div>
                    <span id="room-title">코딩 공부하는 오픈채팅방</span>
                    <span id="user-count">1</span>
                </div>
                <div style="font-size: 18px; color: #333;">☰</div>
            </div>

            <div id="chat-messages">
                </div>

            <div id="chat-input-area">
                <input type="text" placeholder="메시지를 입력하세요..." disabled>
                <div id="send-btn-dummy">전송</div>
            </div>
        </div>
    </div>

    <script>
        // 초기 데이터 세팅
        let friends = [
            { id: 'friend_1', name: '라이언' },
            { id: 'friend_2', name: '어피치' }
        ];
        
        let messages = [
            { id: 1, senderId: 'friend_1', senderName: '라이언', content: '안녕하세요! 오픈채팅방 개설 축하드려요.', time: '오후 3:40' },
            { id: 2, senderId: 'me', senderName: '나', content: '감사합니다 ㅎㅎ 반가워요!', time: '오후 3:41' },
            { id: 3, senderId: 'friend_2', senderName: '어피치', content: '오늘 공부 인증 참여합니다!', time: '오후 3:42' }
        ];

        let msgIdCounter = 4;

        // 초기화 실행
        window.onload = function() {
            renderFriends();
            renderMessages();
            updateRoomCount();
        }

        // 1. 방 이름 변경
        function updateRoomName() {
            const name = document.getElementById('input-room-name').value;
            document.getElementById('room-title').innerText = name || '오픈채팅방';
        }

        function updateRoomCount() {
            // '나' 포함 인원수 계산
            document.getElementById('user-count').innerText = friends.length + 1;
        }

        // 2. 친구 추가 / 삭제 기능
        function renderFriends() {
            const listDiv = document.getElementById('friend-list');
            const selectDom = document.getElementById('select-sender');
            
            listDiv.innerHTML = '';
            // 셀렉트 박스 초기화 (나 기본값)
            selectDom.innerHTML = '<option value="me">나 (본인)</option>';

            friends.forEach(f => {
                // 목록 출력
                listDiv.innerHTML += `
                    <div class="item-row">
                        <span>${f.name} (방장봇)</span>
                        <button onclick="deleteFriend('${f.id}')">삭제</button>
                    </div>
                `;
                // 대화창 선택지 추가
                selectDom.innerHTML += `<option value="${f.id}">${f.name}</option>`;
            });
            updateRoomCount();
        }

        function addFriend() {
            const nameInput = document.getElementById('input-friend-name');
            const name = nameInput.value.trim();
            if(!name) return alert('이름을 입력해주세요.');

            const newId = 'friend_' + Date.now();
            friends.push({ id: newId, name: name });
            nameInput.value = '';
            renderFriends();
        }

        function deleteFriend(id) {
            friends = friends.filter(f => f.id !== id);
            renderFriends();
        }

        // 3. 메시지 렌더링 (추가, 수정, 삭제 반영)
        function renderMessages() {
            const chatBox = document.getElementById('chat-messages');
            chatBox.innerHTML = '';

            messages.forEach(msg => {
                const isMe = msg.senderId === 'me';
                const wrapperClass = isMe ? 'me' : 'other';
                
                // 오픈채팅 방장 표시 (내가 아니면 오픈채팅 방장 마크를 임시로 달아줌)
                const tagSpan = !isMe ? `<span class="sender-tag">방장</span>` : '';
                const nameArea = !isMe ? `<div class="sender-name">${msg.senderName} ${tagSpan}</div>` : '';

                const msgHtml = `
                    <div class="msg-wrapper ${wrapperClass}" id="msg-${msg.id}">
                        ${nameArea}
                        <div class="bubble-area">
                            <div class="bubble">
                                <span class="text-content">${msg.content}</span>
                                <div class="bubble-menu">
                                    <span onclick="editMessage(${msg.id})">수정</span>|
                                    <span onclick="deleteMessage(${msg.id})">삭제</span>
                                </div>
                            </div>
                            <span class="msg-time">${msg.time}</span>
                        </div>
                    </div>
                `;
                chatBox.innerHTML += msgHtml;
            });

            // 스크롤 하단 이동
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 메시지 전송 (추가)
        function textSend() {
            const selectSender = document.getElementById('select-sender');
            const contentInput = document.getElementById('input-msg-content');
            
            const senderId = selectSender.value;
            const content = contentInput.value.trim();
            
            if(!content) return;

            let senderName = '나';
            if(senderId !== 'me') {
                const f = friends.find(f => f.id === senderId);
                senderName = f ? f.name : '알수없음';
            }

            // 현재 시간 구하기 (오후/오전 HH:MM)
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? '오후' : '오전';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            const timeStr = `${ampm} ${hours}:${minutes}`;

            // 데이터 배열 추가
            messages.push({
                id: msgIdCounter++,
                senderId: senderId,
                senderName: senderName,
                content: content,
                time: timeStr
            });

            contentInput.value = '';
            renderMessages();
        }

        // 메시지 삭제
        function deleteMessage(id) {
            messages = messages.filter(m => m.id !== id);
            renderMessages();
        }

        // 메시지 수정
        function editMessage(id) {
            const msg = messages.find(m => m.id === id);
            if(!msg) return;

            const newContent = prompt('수정할 내용을 입력하세요:', msg.content);
            if(newContent === null) return; // 취소 클릭시
            if(newContent.trim() === '') return alert('내용을 입력해야 합니다.');

            msg.content = newContent.trim();
            renderMessages();
        }
    </script>
</body>
</html>
